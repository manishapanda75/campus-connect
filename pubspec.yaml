name: campus_connect
description: Campus Connect - Your Smart College Companion App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Gemini AI (Chatbot)
  google_generative_ai: ^0.4.6

  # URL Launcher (for syllabus, journal links)
  url_launcher: ^6.3.1

  # State Management
  provider: ^6.1.2

  # Local Storage (bookmarks)
  shared_preferences: ^2.3.2

  # Icons and UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
